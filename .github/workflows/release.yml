name: Release

# Pushing a version tag (created by `pnpm release`) builds Jarvis natively on
# macOS, Windows, and Linux, then publishes a GitHub Release once every platform
# build AND the test suite have succeeded.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 1) Gate: unit/integration tests + frontend typecheck must pass first.
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libasound2-dev \
            cmake clang libclang-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Fetch model weights
        run: pnpm fetch-models
      - name: Frontend typecheck + build
        run: pnpm build
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # 2) Build native installers on each OS and upload to a DRAFT release.
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-13 # Intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libasound2-dev \
            cmake clang libclang-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Fetch model weights
        run: pnpm fetch-models
      - name: Build + upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # whisper.cpp uses std::filesystem, which requires macOS >= 10.15.
          # Harmless on Linux/Windows.
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Jarvis ${{ github.ref_name }}"
          releaseBody: "Automated build. Installers for macOS (Apple Silicon + Intel), Windows, and Linux are attached below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # 3) Publish: only runs if ALL platform builds succeeded → flips draft to live.
  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Publish the release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find((r) => r.tag_name === tag);
            if (!release) {
              core.setFailed(`No release found for tag ${tag}`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
            core.info(`Published ${tag}`);
