name: Build on Merge

# Trigger when a PR is merged into main (or when a version tag is pushed)
on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 1) Gate: tests must pass first
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libasound2-dev \
            cmake clang libclang-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Fetch model weights
        run: pnpm fetch-models
      - name: Frontend typecheck + build
        run: pnpm build
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # 2) Build native installers on each OS
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libasound2-dev \
            cmake clang libclang-dev patchelf
      - name: Set up libclang (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            choco install llvm --no-progress -y
          }
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
      - run: pnpm install --frozen-lockfile
      - name: Fetch model weights
        run: pnpm fetch-models
      - name: Build app
        run: pnpm tauri build ${{ matrix.args }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage

  # 3) Create/update release with all artifacts
  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Jarvis ${{ github.ref_name }}"
          body: |
            Automated build triggered by merge to main.
            
            ## Installers
            - **macOS** (Apple Silicon): `.dmg`
            - **Windows**: `.exe` (NSIS installer)
            - **Linux**: `.deb` or `.AppImage`
            
            ## What's Changed
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: *** secrets.GITHUB_TOKEN }}