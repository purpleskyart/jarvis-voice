name: Build on Merge

# Trigger when a PR is merged into main
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # 0) Bump version and create tag
  version:
    runs-on: ubuntu-22.04
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get current version
        id: current
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
      - name: Bump patch version
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          # Increment patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          TAG_NAME="v$NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Bumping version: $CURRENT → $NEW_VERSION"
      - name: Update package.json version
        run: |
          npm version ${{ steps.bump.outputs.new_version }} --no-git-tag-version
      - name: Update Cargo.toml version
        run: |
          sed -i 's/^version = "[^"]*"/version = "${{ steps.bump.outputs.new_version }}"/' src-tauri/Cargo.toml
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }}"
          git tag ${{ steps.bump.outputs.tag_name }}
          git push origin main --tags

  # 1) Gate: tests must pass first
  test:
    needs: version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.tag_name }}
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libasound2-dev \
            cmake clang libclang-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Fetch model weights
        run: pnpm fetch-models
      - name: Frontend typecheck + build
        run: pnpm build
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # 2) Build native installers on each OS
  build:
    needs: [version, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.tag_name }}
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libasound2-dev \
            cmake clang libclang-dev patchelf
      - name: Set up libclang (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            choco install llvm --no-progress -y
          }
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
      - run: pnpm install --frozen-lockfile
      - name: Fetch model weights
        run: pnpm fetch-models
      - name: Build app
        run: pnpm tauri build ${{ matrix.args }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage

  # 3) Create release with all artifacts
  release:
    needs: [version, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.tag_name }}
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.tag_name }}
          name: "Jarvis ${{ needs.version.outputs.new_version }}"
          body: |
            ## Jarvis ${{ needs.version.outputs.new_version }}
            
            Automated build triggered by merge to main.
            
            ## Installers
            - **macOS** (Apple Silicon): `.dmg`
            - **Windows**: `.exe` (NSIS installer)
            - **Linux**: `.deb` or `.AppImage`
            
            ## What's Changed
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ needs.version.outputs.tag_name }})
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}